version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexuslearn-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://nexuslearn:nexuslearn_secret@postgres:5432/nexuslearn
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_API_URL=http://livekit:7880
      - NEXT_PUBLIC_LIVEKIT_URL=${NEXT_PUBLIC_LIVEKIT_URL:-ws://localhost:7880}
      - S3_BUCKET=${S3_BUCKET:-nexuslearn-files}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - nexuslearn

  postgres:
    image: postgres:16-alpine
    container_name: nexuslearn-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nexuslearn
      - POSTGRES_USER=nexuslearn
      - POSTGRES_PASSWORD=nexuslearn_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuslearn -d nexuslearn"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexuslearn

  redis:
    image: redis:7-alpine
    container_name: nexuslearn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - nexuslearn

  livekit:
    image: livekit/livekit-server:latest
    container_name: nexuslearn-livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    command: >
      --config /etc/livekit.yaml
      --dev
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped
    networks:
      - nexuslearn

volumes:
  postgres_data:
  redis_data:

networks:
  nexuslearn:
    driver: bridge
